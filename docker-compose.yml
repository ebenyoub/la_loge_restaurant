services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: la_loge_db
    ports:
      - "127.0.0.1:3309:3306"
    volumes:
      - la_loge_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      API_BASE_URL: http://localhost:4000
      CORS_ORIGIN: http://localhost:3000
      DATABASE_URL: mysql://root:root@db:3306/la_loge_db
      JWT_SECRET: supersecretchangeinproduction32char
      JWT_EXPIRES_IN: 8h
      SMTP_HOST: smtp-relay.brevo.com
      SMTP_PORT: 587
      SMTP_USER:
      SMTP_PASS:
      EMAIL_FROM: La Loge <no-reply@laloge.fr>
      RESTAURANT_NOTIFICATION_EMAIL: manager@laloge.fr
    ports:
      - "4000:4000"

  frontend:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  la_loge_db_data:
